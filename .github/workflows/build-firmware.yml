name: Build firmware

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'firmware/**'
      - '.github/workflows/build-firmware.yml'
  pull_request:
    paths:
      - 'firmware/**'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish release assets on tag builds

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [pico_w, pico2_w]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply bluepad32 patches
        run: firmware/patches/apply.sh

      - name: Install ARM toolchain and CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi \
            build-essential pkg-config libusb-1.0-0-dev

      - name: Checkout Pico SDK
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: master
          path: pico-sdk
          submodules: recursive

      - name: Build
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          cmake -S firmware -B firmware/build -DPICO_BOARD=${{ matrix.board }}
          cmake --build firmware/build -j

      - name: Rename artifact
        run: cp firmware/build/bridge.uf2 blupuck-${{ matrix.board }}.uf2

      - uses: actions/upload-artifact@v4
        with:
          name: blupuck-${{ matrix.board }}
          path: blupuck-${{ matrix.board }}.uf2

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: blupuck-${{ matrix.board }}.uf2
