name: Deploy WebUI to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'webui/**'
      - '.github/workflows/deploy-webui.yml'
  workflow_dispatch:

permissions:
  contents: write   # push the built site to the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install and build
        working-directory: webui
        run: |
          npm ci
          npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: webui/dist
          # CNAME is copied from webui/public into dist; this keeps it in place.
          cname: blupuck.brendanfuller.com
